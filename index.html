<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Explorer</title>
    <meta name="description" content="Search and explore GitHub profiles and repositories" />

    <meta property="og:title" content="GitHub Profile Explorer" />
    <meta property="og:description" content="Search and explore GitHub profiles and repositories" />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/svg+xml" href="/github-icon.svg" />
<!-- TraceFlow Analytics Script -->
<script>
(function(){
  var TF_PID="49c81bae65ed42c1ee2bce7c";
  var TF_EP="http://localhost:3000/api/track";
  var TF_CE="http://localhost:3000/api/conversion";

  // Session management (30-min inactivity timeout)
  var sid=localStorage.getItem("tf_sid");
  var lastTs=parseInt(localStorage.getItem("tf_ts")||"0",10);
  if(!sid||Date.now()-lastTs>1800000){
    sid=Math.random().toString(36).substr(2,12)+Date.now().toString(36);
    localStorage.setItem("tf_sid",sid);
  }
  localStorage.setItem("tf_ts",Date.now().toString());

  // Persistent anonymous visitor ID
  var aid=localStorage.getItem("tf_aid");
  if(!aid){aid=Math.random().toString(36).substr(2,16);localStorage.setItem("tf_aid",aid);}

  // Collect UTM parameters
  var u=new URLSearchParams(window.location.search);

  // Build event payload
  var payload={
    project_id:TF_PID,
    page_url:window.location.href,
    referrer:document.referrer||"",
    utm_source:u.get("utm_source")||"",
    utm_medium:u.get("utm_medium")||"",
    utm_campaign:u.get("utm_campaign")||"",
    utm_content:u.get("utm_content")||"",
    utm_term:u.get("utm_term")||"",
    user_agent:navigator.userAgent,
    device_type:window.innerWidth<768?"mobile":window.innerWidth<1024?"tablet":"desktop",
    session_id:sid,
    anonymous_id:aid,
    timestamp:new Date().toISOString(),
    screen_width:screen.width,
    screen_height:screen.height
  };

  // Send with retry logic
  function send(data,r){
    r=r||0;
    fetch(TF_EP,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data),keepalive:true})
    .catch(function(){if(r<3)setTimeout(function(){send(data,r+1);},1000*(r+1));});
  }
  send(payload);

  // Expose conversion tracker globally
  window.tfConvert=function(type,val,meta){
    fetch(TF_CE,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project_id:TF_PID,session_id:sid,event_type:type||"purchase",value:val||0,metadata:meta||{}})
    });
  };

  // Track SPA navigation (history pushState)
  var origPush=history.pushState;
  history.pushState=function(){
    origPush.apply(this,arguments);
    setTimeout(function(){
      payload.page_url=window.location.href;
      payload.timestamp=new Date().toISOString();
      payload.referrer="";
      var nu=new URLSearchParams(window.location.search);
      payload.utm_source=nu.get("utm_source")||payload.utm_source;
      payload.utm_medium=nu.get("utm_medium")||payload.utm_medium;
      payload.utm_campaign=nu.get("utm_campaign")||payload.utm_campaign;
      send(payload);
    },100);
  };
  window.addEventListener("popstate",function(){
    payload.page_url=window.location.href;
    payload.timestamp=new Date().toISOString();
    send(payload);
  });
})();
</script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
